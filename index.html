<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PupByte Tap</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="stat">🪙 <span id="coins">0</span></div>
    <div class="stat">⛏️ <span id="profit">10</span> P/H</div>
    <div class="stat">💎 0</div>
    <div class="stat">🤖 0</div>
  </div>

  <!-- Cards -->
  <div class="card-row">
    <div class="glass-card">🏆 Bronze</div>
    <div class="glass-card">👛 Connect Wallet</div>
  </div>

<!-- Coin -->
<div id="earnSection">
  <div class="coin-wrapper">
    <div class="coin-circle">
      <img src="logo.png" id="tapBtn" class="main-coin">
    </div>
  </div>
</div>
  
<!-- Boost Section -->
<div id="boostSection" style="display:none;">

  <div class="boost-container">

    <h2 class="boost-title">Your daily boosters:</h2>

    <div class="boost-row">
      <div class="boost-card">
        🔥 Tap Guru <br>
        <small>3/3</small>
      </div>

      <div class="boost-card">
        ⚡ Full energy <br>
        <small>3/3</small>
      </div>
    </div>

    <h2 class="boost-title">Boosters:</h2>

    <div class="boost-item">
      🚀 Boost X2
      <span>400 💎</span>
    </div>

    <div class="boost-item">
      ✋ Multitap
      <span id="multiCost"></span>
    </div>

    <div class="boost-item">
      🔋 Energy Limit
      <span id="energyCost"></span>
    </div>

  </div>
</div>
  
  <!-- Energy -->
  <div class="energy-row">
    <div class="energy">
      ⚡ <span id="energy">100</span>/100
    </div>
    <button class="boost-btn">🔥 Boost</button>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
  <div class="nav-item active" id="navEarn">Earn</div>
  <div class="nav-item">Tasks</div>
  <div class="nav-item">Account</div>
  <div class="nav-item" id="navBoots">Skills</div>
  <div class="nav-item">Cashier</div>
  </div>
  
<script src="script.js"></script>
</body>
</html>
