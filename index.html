<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PupByte Tap Bot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">

    <!-- HEADER STATS -->
    <div class="header-stats">
        <div class="stat-item">
            💰 <span id="coins">0</span>
        </div>
        <div class="stat-item">
            ⚡ <span id="energyText">100 / 100</span>
        </div>
    </div>

    <!-- LEVEL CARD -->
    <div class="card">
        <div class="level-title">Level</div>
        <div class="level-name" id="level">Bronze</div>

        <div class="progress-bar">
            <div class="progress" id="levelProgress"></div>
        </div>

        <div class="next-level" id="nextLevelInfo">
            Next Level: Silver (500 coins)
        </div>
    </div>

    <!-- PROFIT CARD -->
    <div class="card">
        <div class="profit">
            💰 Profit/hour: <span id="profit">0</span>
        </div>

        <button class="upgrade-btn" onclick="upgrade()">
            Upgrade (<span id="upgradeCost">100 coins</span>)
        </button>
    </div>

    <!-- TAP SECTION -->
    <div class="coin-section">
        <div class="coin-card coin-container">
            <div class="tap-btn" onclick="tap(event)">
                TAP
            </div>
        </div>
    </div>

    <!-- BOOST / ENERGY -->
    <div class="energy-section">
        <button class="boost-btn" onclick="showBoots()">
            🔥 Boost
        </button>
    </div>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
    <div class="nav-item active" onclick="showEarn()">🪙<br>Earn</div>
    <div class="nav-item">📋<br>Tasks</div>
    <div class="nav-item">👤<br>Account</div>
    <div class="nav-item">🤖<br>Skills</div>
</nav>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="script.js"></script>

</body>
</html>
