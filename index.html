<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PupByte Tap</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="stat">🪙 <span id="coins">0</span></div>
    <div class="stat">⛏️ <span id="profit">10</span> P/H</div>
    <div class="stat">💎 0</div>
    <div class="stat">🤖 0</div>
  </div>

  <!-- Cards -->
  <div class="card-row">
    <div class="glass-card">🏆 Bronze</div>
    <div class="glass-card">👛 Connect Wallet</div>
  </div>

<!-- Coin -->
<div id="earnSection">
  <div class="coin-wrapper">
    <div class="coin-circle">
      <img src="logo.png" id="tapBtn" class="main-coin">
    </div>
  </div>
</div>
  
<!-- Boost Section -->
<div id="boostSection" style="display:none;">

  <div class="boost-container">

    <h2>🔥 Boots</h2>

    <button id="upgradeTapBtn" class="upgrade-btn">
      Tap Upgrade
    </button>

    <button id="upgradeProfitBtn" class="upgrade-btn">
      Profit Upgrade
    </button>

  </div>
</div>
  
  <!-- Bottom Nav -->
  <div class="bottom-nav">
  <div class="nav-item active" id="navEarn">Earn</div>
  <div class="nav-item">Tasks</div>
  <div class="nav-item">Account</div>
  <div class="nav-item" id="navBoots">Skills</div>
  <div class="nav-item">Cashier</div>
  </div>
  
<script src="script.js"></script>
</body>
</html>
