<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PupByte Tap</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="stat">🪙 <span id="coins">0</span></div>
    <div class="stat">⛏️ <span id="profit">10</span> P/H</div>
    <div class="stat">💎 0</div>
    <div class="stat">🤖 0</div>
  </div>

  <!-- Cards -->
  <div class="card-row">
    <div class="glass-card">🏆 Bronze</div>
    <div class="glass-card">👛 Connect Wallet</div>
  </div>

  <!-- Coin -->
  <div class="coin-wrapper">
    <img src="logo.png" id="tapBtn" class="main-coin">
  </div>

  <div class="upgrade-section">
  <button id="upgradeBtn">Upgrade (100)</button>
  </div>
  
  <!-- Energy -->
  <div class="energy-row">
    <div class="energy">
      ⚡ <span id="energy">100</span>/100
    </div>
    <button class="boost-btn">🔥 Boost</button>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <div class="nav-item active">🪙<br>Earn</div>
    <div class="nav-item">📋<br>Tasks</div>
    <div class="nav-item">👤<br>Account</div>
    <div class="nav-item">🤖<br>Skills</div>
    <div class="nav-item">💰<br>Cashier</div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
