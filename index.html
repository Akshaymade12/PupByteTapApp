<!DOCTYPE html>
<html>
<head>
  <title>PupByte</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div>🪙 <span id="coins">0</span></div>
    <div>⚡ <span id="energy">0</span></div>
  </div>

  <!-- EARN SECTION -->
  <div id="earnSection">

    <div class="coin-section">
      <img src="https://raw.githubusercontent.com/Akshaymade12/PupByteTapApp/main/taplogo.png" id="tapBtn" class="coin">
    </div>

    <button id="upgradeBtn">⬆️ Upgrade Power</button>

  </div>

  <!-- TASK SECTION -->
  <div id="taskSection" style="display:none;">
    <h2>📋 Tasks</h2>

    <p>👥 Invite friends & earn coins</p>

    <div id="refBox">
      <a id="refLink" target="_blank"></a>
    </div>

  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="showSection('earn')">💰<br>Earn</div>
  <div class="nav-item" onclick="showSection('task')">📋<br>Tasks</div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="script.js"></script>

</body>
</html>
