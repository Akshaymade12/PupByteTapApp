<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PupByte</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: radial-gradient(circle at 30% 20%, #3a1c71, #1b1033 60%);
  color: white;
}

.container {
  padding: 15px;
  padding-bottom: 100px;
  max-width: 100%;
  overflow-x: hidden;
}

/* Top Bar */
.top-bar {
  display: flex;
  justify-content: space-between;
  background: rgba(255,255,255,0.08);
  padding: 12px;
  border-radius: 15px;
  margin-bottom: 15px;
}

.level-card {
  background: rgba(255,255,255,0.08);
  padding: 12px;
  border-radius: 15px;
  margin-bottom: 15px;
}

/* Profit Card */
.stats-card {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 20px;
}

.upgrade-btn {
  background: gold;
  border: none;
  padding: 8px 15px;
  border-radius: 10px;
  font-weight: bold;
}

/* Coin */
.coin-container {
  display: flex;
  justify-content: center;
  margin-top: 30px;
}

.coin {
  width: 220px;
  height: 220px;
  border-radius: 50%;
  background: radial-gradient(circle, gold, #b8860b);
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 40px;
  font-weight: bold;
  color: #1b1033;
  box-shadow: 0 0 40px rgba(255,215,0,0.6);
  transition: transform 0.1s;
}

.coin:active {
  transform: scale(0.95);
}

/* Energy Row */
.energy-row {
  display: flex;
  justify-content: space-between;
  margin-top: 30px;
}

.boost-btn {
  background: rgba(255,255,255,0.1);
  padding: 8px 15px;
  border-radius: 10px;
}

/* Boots Card */
.skill-card {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
}

/* Bottom Nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: space-around;
  padding: 12px 0;
}

.nav-item {
  font-size: 14px;
  opacity: 0.8;
}

.nav-item.active {
  opacity: 1;
  color: gold;
}
</style>
</head>

<body>

<div class="container">

    <!-- ================= EARN SECTION ================= -->
  <div id="earnSection">

    <div class="top-bar">
      <div>🪙 <span id="coins">0</span></div>

    <div class="level-card">
      Level: <span id="level">Bronze</span>
      <div id="nextLevelInfo" style="margin-top:5px;font-size:13px;opacity:0.7;"></div>
    </div>

    <div class="stats-card">
      💰 Profit/hour: <span id="profit">0</span><br><br>
      <button class="upgrade-btn" onclick="upgrade()">
        Upgrade (<span id="upgradeCost">100</span>)
      </button>
    </div>

    <div class="coin-container">
      <div class="coin" onclick="tap(event)">
        TAP
      </div>
    </div>

    <div class="energy-row">
  <div>⚡ <span id="energyText">100 / 100</span></div>
  <div class="boost-btn" onclick="showBoots()">🔥 Boots</div>
    </div>

  </div>
  <!-- ================= END EARN ================= -->


  <!-- ================= BOOTS SECTION ================= -->
  <div id="bootsSection" style="display:none;">

    <div class="skill-card">
      💪 Tap Power<br>
      Level: <span id="tapLevel">0</span><br>
      Next Cost: <span id="tapCost">0</span><br><br>
      <button onclick="upgradeTap()">Upgrade</button>
    </div>

    <div class="skill-card">
      🔋 Energy Limit<br>
      Level: <span id="energyLevel">0</span><br>
      Next Cost: <span id="energyCost">0</span><br><br>
      <button onclick="upgradeEnergy()">Upgrade</button>
    </div>

    <div class="skill-card">
      ⚡ Recharge Speed<br>
      Level: <span id="rechargeLevel">0</span><br>
      Next Cost: <span id="rechargeCost">0</span><br><br>
      <button onclick="upgradeRecharge()">Upgrade</button>
    </div>

  </div>
  <!-- ================= END BOOTS ================= -->

</div>
  
</div> <!-- container end -->


<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="showEarn()">Earn</div>
  <div class="nav-item">Tasks</div>
  <div class="nav-item">Account</div>
  <div class="nav-item">Skills</div>
  <div class="nav-item">Shop</div>
</div> <!-- bottom-nav close -->

<script src="script.js?v=6"></script>

</body>
