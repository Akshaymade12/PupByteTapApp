<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PupByte Tap Bot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Coins -->
  <div class="coins-section">
    <div class="coins" id="coins">0</div>
    <div class="energy">⚡ <span id="energy">100</span> / <span id="maxEnergy">100</span></div>
  </div>

  <!-- Level Card -->
  <div class="card">
    <div class="level-title">Level</div>
    <div class="level-name" id="levelName">Bronze</div>

    <div class="progress-bar">
      <div class="progress" id="levelProgress"></div>
    </div>

    <div class="next-level" id="nextLevel">
      Next Level: Silver
    </div>
  </div>

  <!-- Profit Card -->
  <div class="card">
    <div class="profit">
      💰 Profit/hour: <span id="profit">0</span>
    </div>

    <button class="upgrade-btn" onclick="upgradeLevel()">
      Upgrade (100)
    </button>
  </div>

  <!-- Tap Button -->
  <div class="tap-wrapper">
    <div class="tap-btn" onclick="tap()">TAP</div>
  </div>

</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <div class="nav-item active">Earn</div>
  <div class="nav-item">Tasks</div>
  <div class="nav-item">Account</div>
  <div class="nav-item">Skills</div>
  <div class="nav-item">Shop</div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="script.js"></script>

</body>
</html>
