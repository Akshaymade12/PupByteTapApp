<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PupByte Tap</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  background: #0b1120;
  color: white;
  text-align: center;
  font-family: sans-serif;
}

.container {
  padding: 20px;
}

.level-box {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  margin-top: 20px;
}

.progress-wrapper {
  background: #333;
  height: 10px;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 8px;
}

#progressBar {
  height: 10px;
  background: gold;
  width: 0%;
}

#coins {
  font-size: 40px;
  margin-top: 30px;
}

#energy {
  color: #00ff99;
  margin-top: 10px;
}

#profit {
  color: gold;
  margin-top: 10px;
}

button {
  padding: 15px 30px;
  margin-top: 20px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: gold;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

  <h2>PupByte Tap</h2>

  <!-- LEVEL SECTION -->
  <div class="level-box">
    <h3>Level: <span id="level">Bronze</span></h3>

    <div class="progress-wrapper">
      <div id="progressBar"></div>
    </div>

    <div id="nextLevelInfo"></div>
  </div>

  <!-- COINS -->
  <div id="coins">0</div>

  <!-- ENERGY -->
  <div id="energy">Energy: 100 / 100</div>

  <!-- PROFIT -->
  <div id="profit">Profit/hour: 0</div>

  <!-- TAP BUTTON -->
  <button onclick="tap()">TAP</button>

  <br>

  <!-- UPGRADE BUTTON -->
  <button id="upgradeBtn" onclick="upgrade()">
    Upgrade (100 coins)
  </button>

</div>

<script src="script.js?v=5"></script>

</body>
</html>
