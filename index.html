<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PupByte Tap Bot</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div>🪙 <span id="coins">0</span></div>
    <div>⛏ <span id="profit">10</span> P/H</div>
    <div>💎 0</div>
    <div>🤖 0</div>
  </div>

  <!-- RANK + WALLET -->
  <div class="card-row">
    <div class="glass-card" id="openLeague" style="cursor:pointer;">
  🏆 Bronze
</div>
    <div class="glass-card">👛 Connect Wallet</div>
  </div>

  <!-- ================= EARN SECTION ================= -->
  <div id="earnSection">

    <div class="coin-wrapper">
      <img src="logo.png" id="tapBtn" class="main-coin">
    </div>

    <div class="energy-row">
      <div>⚡ <span id="energy">100</span>/100</div>
      <button id="openBoost" class="boost-btn">🔥 Boost</button>
    </div>

  </div>

  <!-- ================= BOOTS SECTION ================= -->
  <div id="boostSection" style="display:none;">

    <div class="boost-header">
      <button id="backBtn">← Back</button>
      <h2>🔥 Boots</h2>
    </div>

    <div class="boost-card">
      <h3>Tap Level</h3>
      <p>Increase coins per tap</p>
      <button id="upgradeTapBtn" class="upgrade-btn">
        Upgrade Tap (<span id="tapCost">100</span>)
      </button>
    </div>

    <div class="boost-card">
      <h3>Profit Level</h3>
      <p>Increase hourly income</p>
      <button id="upgradeProfitBtn" class="upgrade-btn">
        Upgrade Profit (<span id="profitCost">150</span>)
      </button>
    </div>

  </div>

  <!-- ============ LEAGUE SECTION ============ -->
  
<div id="leagueSection" style="display:none;">

  <div class="league-header">
    <h2 id="leagueName">Bronze League</h2>
    <p>Your coins decide your league</p>
  </div>

  <div class="league-cup">
    <img id="leagueImage" src="bronze.png">
  </div>

  <div class="progress-bar">
    <div id="leagueProgress"></div>
  </div>

  <h3>🏆 Top 10 Players</h3>

  <div id="topUsers"></div>

</div>

  <button onclick="generateReferral()">Invite Friends</button>
  
  <!-- ================= BOTTOM NAV ================= -->
  <div class="bottom-nav">
    <div class="nav-item active">Earn</div>
    <div class="nav-item">Tasks</div>
    <div class="nav-item">Account</div>
    <div class="nav-item">Skills</div>
    <div class="nav-item">Cashier</div>
  </div>

</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="script.js"></script>
</body>
</html>
