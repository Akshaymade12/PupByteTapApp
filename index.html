<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PupByte</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: radial-gradient(circle at 30% 20%, #3a1c71, #1b1033 60%);
  color: white;
  overflow-x: hidden;
}

.container {
  padding: 15px;
}

/* TOP BALANCE BAR */
.top-bar {
  display: flex;
  justify-content: space-between;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  padding: 12px;
  border-radius: 15px;
  margin-bottom: 15px;
}

.level-card {
  background: rgba(255,255,255,0.08);
  padding: 12px;
  border-radius: 15px;
  margin-bottom: 15px;
}

/* BIG COIN */
.coin-container {
  display: flex;
  justify-content: center;
  margin-top: 40px;
}

.coin {
  width: 220px;
  height: 220px;
  border-radius: 50%;
  background: radial-gradient(circle, gold, #b8860b);
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 40px;
  font-weight: bold;
  color: #1b1033;
  box-shadow: 0 0 40px rgba(255,215,0,0.6);
  transition: transform 0.1s;
}

.coin:active {
  transform: scale(0.95);
}

/* ENERGY + BOOST */
.energy-row {
  display: flex;
  justify-content: space-between;
  margin-top: 40px;
  padding: 0 10px;
}

.boost-btn {
  background: rgba(255,255,255,0.1);
  padding: 10px 18px;
  border-radius: 12px;
}

/* BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  backdrop-filter: blur(10px);
}

.nav-item {
  text-align: center;
  font-size: 14px;
  opacity: 0.8;
}

.nav-item.active {
  opacity: 1;
  color: gold;
}
</style>
</head>

<body>

<div class="container">

  <!-- EARN SECTION START -->
  <div id="earnSection">

    <!-- TOP BAR -->
    <div class="top-bar">
      <div>🪙 <span id="coins">0</span></div>
      <div>⚡ <span id="energy">100/100</span></div>
    </div>

    <!-- LEVEL -->
    <div class="level-card">
      Level: <span id="level">Bronze</span>
    </div>

    <div id="nextLevelInfo" style="margin-top:8px; font-size:14px; opacity:0.8;"></div>
    
    <div class="stats-card">
      <div>💰 Profit/hour: <span id="profit">0</span></div>
      <div style="margin-top:8px;">
        <button class="upgrade-btn" onclick="upgrade()">
          Upgrade (<span id="upgradeCost">100</span>)
        </button>
      </div>
    </div>
    
    <!-- BIG COIN -->
    <div class="coin-container">
      <div class="coin" onclick="tap(event)">
        TAP
      </div>
    </div>

    <!-- ENERGY + BOOST -->
    <div class="energy-row">
      <div>⚡ <span id="energyText">100 / 100</span></div>
     <div class="boost-btn" onclick="showBoots()">🔥 Boots</div>

  </div>
  <!-- EARN SECTION END -->


  <!-- BOOTS SECTION -->
  <div id="bootsSection" style="display:none; margin-top:30px;">

    <div class="skill-card">
      💪 Tap Power
      <div>Level: <span id="tapLevel">0</span></div>
      <button onclick="upgradeTap()">Upgrade</button>
    </div>

    <div class="skill-card">
      🔋 Energy Limit
      <div>Level: <span id="energyLevel">0</span></div>
      <button onclick="upgradeEnergy()">Upgrade</button>
    </div>

    <div class="skill-card">
      ⚡ Recharge Speed
      <div>Level: <span id="rechargeLevel">0</span></div>
      <button onclick="upgradeRecharge()">Upgrade</button>
    </div>

  </div>

</div> <!-- container end -->


<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="showEarn()">Earn</div>
  <div class="nav-item">Tasks</div>
  <div class="nav-item">Account</div>
  <div class="nav-item">Skills</div>
  <div class="nav-item">Shop</div>

<script src="script.js?v=6"></script>

</body>
