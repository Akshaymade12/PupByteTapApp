<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - PupByte</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b, #111827);
      color: white;
      min-height: 100vh;
    }

    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-box {
      width: 100%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 30px 20px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }

    .login-logo {
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      color: #38bdf8;
      margin-bottom: 12px;
    }

    .login-box h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 8px;
    }

    .login-subtitle {
      text-align: center;
      color: #cbd5e1;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-group label {
      font-size: 14px;
      color: #e2e8f0;
    }

    .input-group input {
      width: 100%;
      padding: 14px;
      border: 1px solid #334155;
      border-radius: 12px;
      outline: none;
      background: #0f172a;
      color: white;
      font-size: 15px;
    }

    .login-btn {
      margin-top: 10px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #38bdf8, #2563eb);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="login-page">
    <div class="login-box">
      <div class="login-logo">PupByte</div>
      <h1>Admin Login</h1>
      <p class="login-subtitle">Sign in to access admin panel</p>

      <div class="login-form">
        <div class="input-group">
          <label for="adminEmail">Email</label>
          <input type="email" id="adminEmail" placeholder="Enter admin email">
        </div>

        <div class="input-group">
          <label for="adminPassword">Password</label>
          <input type="password" id="adminPassword" placeholder="Enter password">
        </div>

        <button type="button" class="login-btn" onclick="loginAdmin()">Login</button>
      </div>
    </div>
  </div>

  <script>
    function loginAdmin() {
      const email = document.getElementById("adminEmail").value.trim();
      const password = document.getElementById("adminPassword").value.trim();

      if (email === "admin@pupbyte.com" && password === "12345") {
        alert("Login Successful");
        document.body.innerHTML = `
          <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f172a;color:white;font-family:Arial,sans-serif;">
            <h1>Welcome Admin Dashboard 🚀</h1>
          </div>
        `;
      } else {
        alert("Invalid Credentials");
      }
    }
  </script>

</body>
</html>
