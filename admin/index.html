<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PupByte Admin</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<!-- ================= LOGIN PAGE ================= -->
<div id="loginPage" class="login-page">

  <div class="login-card">
    <h2>PupByte Admin</h2>

    <input type="text" id="adminUser" placeholder="Username">
    <input type="password" id="adminPass" placeholder="Password">

    <button id="loginBtn">Login</button>

    <p id="loginError" class="error-text"></p>
  </div>

</div>

<!-- ================= ADMIN PANEL ================= -->
<div id="adminPanel" class="admin-panel" style="display:none;">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3>PupByte</h3>

    <div class="menu-item active">Dashboard</div>
    <div class="menu-item">Users</div>
    <div class="menu-item">Tasks</div>
    <div class="menu-item">Rewards</div>
    <div class="menu-item">Skills</div>
    <div class="menu-item">Boosts</div>
    <div class="menu-item">Airdrop</div>
    <div class="menu-item">Logs</div>

    <div class="menu-item logout" id="logoutBtn">Logout</div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOP BAR -->
    <div class="topbar">
      <h2>Dashboard</h2>
    </div>

    <!-- DASHBOARD CARDS -->
    <div class="cards">

      <div class="card">
        <p>Total Users</p>
        <h3 id="totalUsers">0</h3>
      </div>

      <div class="card">
        <p>Active Today</p>
        <h3 id="activeUsers">0</h3>
      </div>

      <div class="card">
        <p>Total Coins</p>
        <h3 id="totalCoins">0</h3>
      </div>

      <div class="card">
        <p>Referrals</p>
        <h3 id="totalRefs">0</h3>
      </div>

    </div>

    <!-- RECENT ACTIVITY -->
    <div class="table-box">
      <h3>Recent Activity</h3>
      <div id="activityList">
        <p>No data yet</p>
      </div>
    </div>

  </div>

</div>

<script src="admin.js"></script>
</body>
</html>
